# Site settings
title: Scott Kidder
tagline: Engineering, distributed systems, and the occasional rabbit hole.
description: Engineering, distributed systems, and technology by Scott Kidder.
url: https://www.kidder.io
baseurl: ""

# Theme
remote_theme: hydecorp/hydejack@v9

# Hydejack settings
hydejack:
  accent_color: "#0ea5e9"
  accent_image:
    background: "#0d1b2a"
    overlay: true
  no_mark_external: true
  no_push_state: false
  no_drawer: false
  no_navbar: false
  no_search: false
  no_inline_css: false
  no_page_style: false
  no_break_layout: true
  no_toc: false
  no_third_column: false
  no_large_headings: false
  no_structured_data: false
  no_theme_color: false
  no_breadcrumbs: false
  use_lsi: false
  cookies_banner: false
  advertise: false
  hide_dates: false
  hide_last_modified: false
  dark_mode:
    always: false
    dynamic: true
    icon: true

# Sidebar navigation
menu:
  - title: Blog
    url:   /
  - title: About
    url:   /about/

# Author
author:
  name: Scott Kidder
  email: kidder.scott@gmail.com
  social:
    github: skidder
    twitter: hexdumpster
    linkedin: scott-kidder-2271041

# Pagination
paginate: 5
paginate_path: /page-:num/

# Permalinks
permalink: pretty

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-gist
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap

# GitHub
github:
  repo: https://github.com/skidder/skidder.github.io

# Hydejack custom CSS (loaded automatically by the theme)
hydejack:
  custom_css: true

# Sass
sass:
  style: compressed

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE.md
